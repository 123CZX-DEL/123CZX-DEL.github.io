<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业季 · 时光留言箱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9f3e8 0%, #fde9e0 100%);
            font-family: 'Quicksand', 'Noto Serif SC', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,215,179,0.5) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -8%;
            right: -3%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(200,180,220,0.4) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 250, 245, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 15px 30px rgba(120, 80, 50, 0.12);
            padding: 2.2rem 2rem;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 245, 235, 0.7);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-icon {
            font-size: 2.8rem;
            color: #d99b7a;
            margin-bottom: 0.25rem;
            text-shadow: 2px 2px 0 rgba(255,255,240,0.8);
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            font-size: 2.8rem;
            color: #5e4632;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(255,255,250,0.9);
            margin-bottom: 0.4rem;
        }

        .subhead {
            font-size: 1.1rem;
            color: #aa8c7a;
            font-weight: 400;
            border-top: 1px dashed #dbb594;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.3rem;
        }

        .sync-status {
            text-align: center;
            padding: 0.6rem;
            font-size: 0.85rem;
            color: #aa8c7a;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .sync-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4a8b5e;
            animation: pulse 2s infinite;
        }

        .sync-indicator.offline {
            background: #b15e4a;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .toggle-bar {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2.2rem;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: rgba(250, 240, 230, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #e7cfb0;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #6b4f3c;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 18px rgba(160, 120, 80, 0.1);
            letter-spacing: 0.5px;
        }

        .toggle-btn i {
            font-size: 1.2rem;
        }

        .toggle-btn.active {
            background: #d9b382;
            border-color: #b58b5a;
            color: #fffef9;
            box-shadow: 0 12px 24px rgba(180, 120, 60, 0.35);
            transform: translateY(-2px);
        }

        .toggle-btn:hover {
            background: #e7cfb0;
            color: #3e2e22;
            border-color: #c8a27b;
        }

        .toggle-btn.active:hover {
            background: #c69c6d;
            color: white;
        }

        .card {
            background: rgba(255, 251, 247, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2rem 2rem 1.8rem;
            box-shadow: 0 20px 35px rgba(140, 100, 70, 0.12);
            border: 1px solid rgba(235, 205, 170, 0.7);
            transition: all 0.4s ease;
        }

        .hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 600;
            color: #5e4a37;
            font-size: 1rem;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            letter-spacing: 0.3px;
        }

        input, textarea {
            width: 100%;
            background: #fffef7;
            border: 1.5px solid #e7cfb9;
            border-radius: 24px;
            padding: 0.9rem 1.4rem;
            font-size: 1rem;
            font-family: 'Quicksand', 'Noto Serif SC', sans-serif;
            outline: none;
            transition: 0.25s ease;
            background: #fffcf5;
            color: #3b332b;
            resize: vertical;
        }

        input:focus, textarea:focus {
            border-color: #c99c7b;
            box-shadow: 0 0 0 4px rgba(217, 155, 122, 0.2);
            background: #ffffff;
        }

        textarea {
            min-height: 110px;
        }

        .submit-btn {
            background: #c8a27b;
            border: none;
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.15rem;
            color: #fffef5;
            background: linear-gradient(135deg, #b58b5a, #9c7a5c);
            box-shadow: 0 10px 20px rgba(140, 100, 60, 0.3);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: 0.3s;
            border: 1px solid #dbb07b;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #c79a6e, #b0835a);
            box-shadow: 0 14px 28px rgba(160, 110, 60, 0.4);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 12px rgba(120, 80, 40, 0.4);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .password-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.8rem;
        }

        .password-wrapper {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .password-input {
            flex: 2;
            min-width: 200px;
        }

        .unlock-btn {
            background: #f5e7da;
            border: 1px solid #c8aa88;
            color: #4e3b2c;
            font-weight: 600;
            padding: 0.9rem 1.8rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #ede0d0;
        }

        .unlock-btn:hover {
            background: #dbbc8c;
            color: #2f2419;
            border-color: #aa8b6e;
        }

        .unlock-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message-list {
            margin-top: 1.8rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-item {
            background: #fffbf3;
            border-radius: 28px;
            padding: 1.1rem 1.5rem;
            border-left: 6px solid #d9b382;
            box-shadow: 0 6px 18px rgba(150, 110, 70, 0.08);
            transition: 0.2s;
            word-break: break-word;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .message-item:hover {
            box-shadow: 0 10px 25px rgba(150, 110, 70, 0.15);
            transform: translateX(5px);
        }

        .message-item strong {
            color: #7b5e47;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .message-item p {
            color: #4e3f32;
            line-height: 1.6;
            margin: 0.4rem 0;
        }

        .message-item .time {
            font-size: 0.8rem;
            color: #b2977e;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .message-item .delete-btn {
            background: rgba(255, 107, 107, 0.2);
            border: 1px solid rgba(255, 107, 107, 0.5);
            color: #b15e4a;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }

        .message-item .delete-btn:hover {
            background: rgba(255, 107, 107, 0.4);
            border-color: #b15e4a;
        }

        .no-data {
            text-align: center;
            color: #b9a18b;
            font-style: italic;
            padding: 2rem;
        }

        .error-message {
            color: #b15e4a;
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        .success-message {
            color: #4a8b5e;
            font-size: 0.9rem;
            margin-top: 0.4rem;
            background: rgba(74, 139, 94, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 20px;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #b2967c;
            font-size: 0.85rem;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: rgba(217, 155, 122, 0.05);
            border-radius: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d9b382;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #aa8c7a;
        }

        @media (max-width: 550px) {
            .main-container {
                padding: 1.8rem 1.2rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
            .message-list {
                max-height: 400px;
            }
        }

        .message-list::-webkit-scrollbar {
            width: 6px;
        }

        .message-list::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
        }

        .message-list::-webkit-scrollbar-thumb {
            background: #d9b382;
            border-radius: 10px;
        }

        .message-list::-webkit-scrollbar-thumb:hover {
            background: #c99c7b;
        }
    </style>
</head>
<body>
<div class="main-container">
    <div class="header">
        <div class="header-icon">
            <i class="fas fa-feather-alt"></i>
        </div>
        <h1>时光留言箱</h1>
        <div class="subhead">致我们滚烫的青春 · 毕业生心里话</div>
    </div>

    <div class="sync-status">
        <span class="sync-indicator" id="syncIndicator"></span>
        <span id="syncText">云端同步已连接</span>
    </div>

    <div class="toggle-bar">
        <button id="showWriteBtn" class="toggle-btn active">
            <i class="fas fa-pen-fancy"></i> 写留言
        </button>
        <button id="showViewBtn" class="toggle-btn">
            <i class="fas fa-lock"></i> 查看收藏
        </button>
    </div>

    <!-- 写留言卡片 -->
    <div id="writeCard" class="card">
        <form id="messageForm">
            <div class="form-group">
                <label><i class="fas fa-user-graduate"></i> 你的名字</label>
                <input type="text" id="senderName" placeholder="例如：小明 / 匿名小可爱" required autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-comment-dots"></i> 班级</label>
                <input type="text" id="senderClass" placeholder="例如：高三1班" required autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> 联系方式（可选）</label>
                <input type="text" id="senderContact" placeholder="QQ / 微信 / 电话" autocomplete="off">
            </div>
            <div class="form-group">
                <label><i class="fas fa-heart"></i> 心里话</label>
                <textarea id="messageContent" placeholder="写点什么吧... 关于青春、离别、感谢或梦想..." required></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> 投递到时光箱
            </button>
            <div id="successMessage" class="success-message hidden"></div>
            <div id="errorMessage" class="error-message hidden"></div>
        </form>
        <div class="footer-note">
            <i class="far fa-smile"></i> 每一句话都会被温柔收藏
        </div>
    </div>

    <!-- 查看留言卡片 -->
    <div id="viewCard" class="card hidden">
        <div class="password-section">
            <label style="justify-content:center; margin-bottom:0.6rem;"><i class="fas fa-key"></i> 管理员验证</label>
            <div class="password-wrapper">
                <input type="password" id="adminPassword" class="password-input" placeholder="输入密码解锁" value="">
                <button type="button" id="unlockButton" class="unlock-btn"><i class="fas fa-unlock-alt"></i> 解锁</button>
            </div>
            <div id="passwordError" class="error-message"></div>
        </div>

        <div id="unlockedArea" class="hidden">
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="messageCount">0</div>
                    <div class="stat-label">条留言</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="classCount">0</div>
                    <div class="stat-label">个班级</div>
                </div>
            </div>

            <div class="message-list" id="messageContainer">
                <div class="no-data"><i class="far fa-envelope-open"></i> 还没有留言，快去做第一个吧 🌟</div>
            </div>

            <div style="display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;">
                <button id="refreshAfterUnlock" class="unlock-btn"><i class="fas fa-sync-alt"></i> 刷新列表</button>
                <button id="exportBtn" class="unlock-btn"><i class="fas fa-download"></i> 导出数据</button>
                <button id="clearAllBtn" class="unlock-btn" style="background: rgba(255, 107, 107, 0.2); color: #b15e4a;"><i class="fas fa-trash"></i> 清空所有</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== GitHub 配置（请务必修改） ====================
        // ⚠️ 重要：请将下方 Token 替换为您在 GitHub 生成的有效 Token
        // 生成地址：https://github.com/settings/tokens
        // 必须勾选权限：repo (全部)
        const GITHUB_TOKEN = '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';   // <--- 替换这里！
        
        const GITHUB_OWNER = '123CZX-DEL';
        const GITHUB_REPO = '123CZX-DEL.github.io';
        const GITHUB_FILE = 'messages-data.json';
        
        // 请确认您的仓库默认分支是 main 还是 master，修改下一行
        const GITHUB_BRANCH = 'main';   // 如果是 master，请改为 'master'
        // ================================================================
        
        const STORAGE_KEY = 'graduate_message_box_v2';
        let currentFileSha = null;
        const syncIndicator = document.getElementById('syncIndicator');
        const syncText = document.getElementById('syncText');

        function updateSyncStatus(connected, errorMsg = '') {
            if (connected) {
                syncIndicator.classList.remove('offline');
                syncIndicator.style.background = '#4a8b5e';
                syncText.textContent = '✓ 云端同步已连接';
            } else {
                syncIndicator.classList.add('offline');
                syncIndicator.style.background = '#b15e4a';
                if (errorMsg.includes('401')) {
                    syncText.textContent = '✕ Token 无效或已过期，请重新生成';
                } else {
                    syncText.textContent = '✕ 云端同步失败，使用本地存储';
                }
            }
        }

        // 正确编码 base64（支持中文）
        function utf8ToBase64(str) {
            const utf8Bytes = new TextEncoder().encode(str);
            let binaryStr = '';
            for (let i = 0; i < utf8Bytes.length; i++) {
                binaryStr += String.fromCharCode(utf8Bytes[i]);
            }
            return btoa(binaryStr);
        }

        // 解码 base64（支持中文）
        function base64ToUtf8(base64Str) {
            const binaryStr = atob(base64Str);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            return new TextDecoder('utf-8').decode(bytes);
        }

        async function getMessagesFromGitHub() {
            // 如果没有配置有效的 Token
            if (!GITHUB_TOKEN || GITHUB_TOKEN === '请在此处粘贴您的有效GitHubToken') {
                console.warn('未配置有效的 GitHub Token');
                updateSyncStatus(false, 'no_token');
                return getMessagesFromLocal();
            }

            try {
                const response = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${GITHUB_TOKEN}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (response.status === 404) {
                    console.log('文件不存在，将创建新文件');
                    updateSyncStatus(true);
                    return [];
                }

                if (response.status === 401) {
                    console.error('Token 无效或已过期 (401)');
                    updateSyncStatus(false, '401');
                    return getMessagesFromLocal();
                }

                if (!response.ok) {
                    console.warn('GitHub 读取失败:', response.status);
                    updateSyncStatus(false);
                    return getMessagesFromLocal();
                }

                const fileData = await response.json();
                currentFileSha = fileData.sha;
                console.log('获取 SHA 成功:', currentFileSha);

                const content = base64ToUtf8(fileData.content);
                const data = JSON.parse(content);
                console.log('从 GitHub 读取成功，共', data.length, '条留言');
                updateSyncStatus(true);
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('获取数据失败:', error);
                updateSyncStatus(false);
                return getMessagesFromLocal();
            }
        }

        async function saveMessagesToGitHub(messages) {
            if (!GITHUB_TOKEN || GITHUB_TOKEN === '请在此处粘贴您的有效GitHubToken') {
                saveMessagesToLocal(messages);
                return false;
            }

            try {
                // 如果没有 SHA，先获取当前文件信息
                if (!currentFileSha) {
                    const getResponse = await fetch(
                        `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`,
                        {
                            headers: {
                                'Authorization': `Bearer ${GITHUB_TOKEN}`,
                                'Accept': 'application/vnd.github.v3+json'
                            }
                        }
                    );

                    if (getResponse.status === 200) {
                        const fileData = await getResponse.json();
                        currentFileSha = fileData.sha;
                        console.log('重新获取 SHA:', currentFileSha);
                    } else if (getResponse.status === 401) {
                        console.error('Token 无效 (401)');
                        updateSyncStatus(false, '401');
                        saveMessagesToLocal(messages);
                        return false;
                    } else if (getResponse.status !== 404) {
                        console.error('获取文件信息失败:', getResponse.status);
                        saveMessagesToLocal(messages);
                        return false;
                    }
                }

                // 编码内容
                const jsonString = JSON.stringify(messages, null, 2);
                const content = utf8ToBase64(jsonString);

                console.log('准备保存，消息数量:', messages.length);
                const requestBody = {
                    message: `更新留言板 - ${new Date().toLocaleString('zh-CN')}`,
                    content: content,
                    branch: GITHUB_BRANCH
                };
                if (currentFileSha) {
                    requestBody.sha = currentFileSha;
                    console.log('使用 SHA 更新:', currentFileSha);
                } else {
                    console.log('创建新文件');
                }

                const updateResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${GITHUB_TOKEN}`,
                            'Content-Type': 'application/json',
                            'Accept': 'application/vnd.github.v3+json'
                        },
                        body: JSON.stringify(requestBody)
                    }
                );

                if (!updateResponse.ok) {
                    const errorData = await updateResponse.json();
                    console.error('更新失败:', errorData);
                    currentFileSha = null;
                    saveMessagesToLocal(messages);
                    updateSyncStatus(false);
                    return false;
                }

                const result = await updateResponse.json();
                currentFileSha = result.content.sha;
                console.log('GitHub 保存成功，新 SHA:', currentFileSha);
                saveMessagesToLocal(messages);
                updateSyncStatus(true);
                return true;
            } catch (error) {
                console.error('保存到 GitHub 失败:', error);
                currentFileSha = null;
                saveMessagesToLocal(messages);
                updateSyncStatus(false);
                return false;
            }
        }

        function getMessagesFromLocal() {
            const stored = localStorage.getItem(STORAGE_KEY);
            try {
                const data = stored ? JSON.parse(stored) : [];
                console.log('从本地读取，共', data.length, '条留言');
                return data;
            } catch (e) {
                return [];
            }
        }

        function saveMessagesToLocal(messages) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            console.log('已保存到本地，共', messages.length, '条留言');
        }

        async function getMessages() {
            return await getMessagesFromGitHub();
        }

        async function saveMessages(messages) {
            return await saveMessagesToGitHub(messages);
        }

        async function addMessage(name, className, contact, content) {
            const messages = await getMessages();
            const newMessage = {
                id: Date.now(),
                name: name.trim() || "匿名同学",
                className: className.trim(),
                contact: contact.trim(),
                content: content.trim(),
                timestamp: new Date().toLocaleString('zh-CN', {
                    year: 'numeric', month: '2-digit', day: '2-digit',
                    hour: '2-digit', minute: '2-digit', second: '2-digit'
                })
            };
            messages.push(newMessage);
            await saveMessages(messages);
            return newMessage;
        }

        async function deleteMessage(id) {
            let messages = await getMessages();
            messages = messages.filter(msg => msg.id !== id);
            await saveMessages(messages);
        }

        // DOM 元素绑定
        const writeCard = document.getElementById('writeCard');
        const viewCard = document.getElementById('viewCard');
        const showWriteBtn = document.getElementById('showWriteBtn');
        const showViewBtn = document.getElementById('showViewBtn');

        const messageForm = document.getElementById('messageForm');
        const senderNameInput = document.getElementById('senderName');
        const senderClassInput = document.getElementById('senderClass');
        const senderContactInput = document.getElementById('senderContact');
        const messageContentInput = document.getElementById('messageContent');
        const successMessageDiv = document.getElementById('successMessage');
        const errorMessageDiv = document.getElementById('errorMessage');
        const submitBtn = document.getElementById('submitBtn');

        const adminPasswordInput = document.getElementById('adminPassword');
        const unlockButton = document.getElementById('unlockButton');
        const passwordErrorDiv = document.getElementById('passwordError');
        const messageContainer = document.getElementById('messageContainer');
        const unlockedArea = document.getElementById('unlockedArea');
        const refreshBtn = document.getElementById('refreshAfterUnlock');
        const exportBtn = document.getElementById('exportBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const messageCountSpan = document.getElementById('messageCount');
        const classCountSpan = document.getElementById('classCount');

        const CORRECT_PASSWORD = '123456';
        let isAuthenticated = false;

        function setActiveCard(cardType) {
            if (cardType === 'write') {
                writeCard.classList.remove('hidden');
                viewCard.classList.add('hidden');
                showWriteBtn.classList.add('active');
                showViewBtn.classList.remove('active');
            } else {
                viewCard.classList.remove('hidden');
                writeCard.classList.add('hidden');
                showViewBtn.classList.add('active');
                showWriteBtn.classList.remove('active');
            }
        }

        showWriteBtn.addEventListener('click', () => setActiveCard('write'));
        showViewBtn.addEventListener('click', () => setActiveCard('view'));

        messageForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = senderNameInput.value.trim();
            const className = senderClassInput.value.trim();
            const contact = senderContactInput.value.trim();
            const content = messageContentInput.value.trim();

            if (!name || !className || !content) {
                showError('请填写名字、班级和心里话哟 ✨');
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在投递...';

                await addMessage(name, className, contact, content);

                senderNameInput.value = '';
                senderClassInput.value = '';
                senderContactInput.value = '';
                messageContentInput.value = '';

                showSuccess('✅ 留言已投递到时光箱！感谢你的分享！');

                if (isAuthenticated) {
                    renderMessages();
                }
            } catch (error) {
                showError('投递失败，请稍后重试');
                console.error(error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 投递到时光箱';
            }
        });

        function showSuccess(message) {
            successMessageDiv.classList.remove('hidden');
            successMessageDiv.textContent = message;
            setTimeout(() => {
                successMessageDiv.classList.add('hidden');
            }, 3000);
        }

        function showError(message) {
            errorMessageDiv.classList.remove('hidden');
            errorMessageDiv.textContent = message;
            setTimeout(() => {
                errorMessageDiv.classList.add('hidden');
            }, 3000);
        }

        unlockButton.addEventListener('click', function() {
            const enteredPassword = adminPasswordInput.value;
            if (enteredPassword === CORRECT_PASSWORD) {
                isAuthenticated = true;
                passwordErrorDiv.textContent = '';
                adminPasswordInput.value = '';
                unlockedArea.classList.remove('hidden');
                renderMessages();
            } else {
                isAuthenticated = false;
                passwordErrorDiv.textContent = '❌ 密码错误，请重试 🔒';
                unlockedArea.classList.add('hidden');
                adminPasswordInput.value = '';
            }
        });

        adminPasswordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                unlockButton.click();
            }
        });

        refreshBtn.addEventListener('click', async function() {
            if (isAuthenticated) {
                refreshBtn.disabled = true;
                refreshBtn.innerHTML = '<i class="fas fa-sync-alt fa-spin"></i> 刷新中...';
                await renderMessages();
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 刷新列表';
            }
        });

        exportBtn.addEventListener('click', async function() {
            const messages = await getMessages();
            if (messages.length === 0) {
                alert('还没有留言，无法导出！');
                return;
            }

            let csvContent = "data:text/csv;charset=utf-8,\uFEFF姓名,班级,联系方式,留言内容,时间\n";
            messages.forEach(msg => {
                const row = [
                    msg.name,
                    msg.className,
                    msg.contact || '无',
                    msg.content.replace(/,/g, '，'),
                    msg.timestamp
                ].join(',');
                csvContent += row + "\n";
            });

            const link = document.createElement('a');
            link.setAttribute('href', encodeURI(csvContent));
            link.setAttribute('download', `毕业留言箱_${new Date().toLocaleString('zh-CN', {year: 'numeric', month: '2-digit', day: '2-digit'})}.csv`);
            link.click();
        });

        clearAllBtn.addEventListener('click', async function() {
            if (confirm('⚠️ 确定要清空所有留言吗？此操作无法撤销！')) {
                await saveMessages([]);
                currentFileSha = null;
                await renderMessages();
                passwordErrorDiv.textContent = '✅ 所有留言已清空';
                setTimeout(() => {
                    passwordErrorDiv.textContent = '';
                }, 2000);
            }
        });

        async function renderMessages() {
            if (!isAuthenticated) {
                messageContainer.innerHTML = '<div class="no-data"><i class="fas fa-lock"></i> 未验证</div>';
                return;
            }

            const messages = await getMessages();

            messageCountSpan.textContent = messages.length;
            const uniqueClasses = new Set(messages.map(m => m.className));
            classCountSpan.textContent = uniqueClasses.size;

            if (messages.length === 0) {
                messageContainer.innerHTML = '<div class="no-data"><i class="far fa-envelope"></i> 还没有留言，快去做第一个吧 🌟</div>';
                return;
            }

            const sortedMessages = [...messages].reverse();

            let html = '';
            sortedMessages.forEach(msg => {
                html += `
                        <div class="message-item">
                            <strong><i class="fas fa-user-circle"></i> ${escapeHtml(msg.name)} <span style="font-weight: 400; color: #aa8c7a;">(${escapeHtml(msg.className)})</span></strong>
                            <p>${escapeHtml(msg.content)}</p>
                            ${msg.contact ? `<p style="font-size: 0.9rem; color: #b2977e;"><i class="fas fa-phone"></i> ${escapeHtml(msg.contact)}</p>` : ''}
                            <div class="time"><i class="far fa-clock"></i> ${escapeHtml(msg.timestamp)}</div>
                            <button class="delete-btn" data-id="${msg.id}"><i class="fas fa-trash-alt"></i> 删除</button>
                        </div>
                    `;
            });
            messageContainer.innerHTML = html;

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async function(e) {
                    e.preventDefault();
                    const id = parseInt(this.dataset.id);
                    if (confirm('确定要删除这条留言吗？')) {
                        await deleteMessage(id);
                        await renderMessages();
                    }
                });
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // 初始化
        setActiveCard('write');
        updateSyncStatus(!!GITHUB_TOKEN && GITHUB_TOKEN !== '请在此处粘贴您的有效GitHubToken');
    })();
</script>
</body>
</html>
