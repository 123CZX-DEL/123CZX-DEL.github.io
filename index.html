<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业季 · 时光留言箱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9f3e8 0%, #fde9e0 100%);
            font-family: 'Quicksand', 'Noto Serif SC', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,215,179,0.5) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -8%;
            right: -3%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(200,180,220,0.4) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 250, 245, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 15px 30px rgba(120, 80, 50, 0.12);
            padding: 2.2rem 2rem;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 245, 235, 0.7);
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header-icon {
            font-size: 2.8rem;
            color: #d99b7a;
            margin-bottom: 0.25rem;
            text-shadow: 2px 2px 0 rgba(255,255,240,0.8);
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            font-size: 2.8rem;
            color: #5e4632;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(255,255,250,0.9);
            margin-bottom: 0.4rem;
        }

        .subhead {
            font-size: 1.1rem;
            color: #aa8c7a;
            font-weight: 400;
            border-top: 1px dashed #dbb594;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.3rem;
        }

        .toggle-bar {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 2.2rem;
            flex-wrap: wrap;
        }

        .toggle-btn {
            background: rgba(250, 240, 230, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #e7cfb0;
            padding: 0.8rem 2.2rem;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #6b4f3c;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 8px 18px rgba(160, 120, 80, 0.1);
            letter-spacing: 0.5px;
        }

        .toggle-btn i {
            font-size: 1.2rem;
        }

        .toggle-btn.active {
            background: #d9b382;
            border-color: #b58b5a;
            color: #fffef9;
            box-shadow: 0 12px 24px rgba(180, 120, 60, 0.35);
            transform: translateY(-2px);
        }

        .toggle-btn:hover {
            background: #e7cfb0;
            color: #3e2e22;
            border-color: #c8a27b;
        }

        .toggle-btn.active:hover {
            background: #c69c6d;
            color: white;
        }

        .card {
            background: rgba(255, 251, 247, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 2rem 2rem 1.8rem;
            box-shadow: 0 20px 35px rgba(140, 100, 70, 0.12);
            border: 1px solid rgba(235, 205, 170, 0.7);
            transition: all 0.4s ease;
        }

        .hidden {
            display: none;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            font-weight: 600;
            color: #5e4a37;
            font-size: 1rem;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            letter-spacing: 0.3px;
        }

        input, textarea {
            width: 100%;
            background: #fffef7;
            border: 1.5px solid #e7cfb9;
            border-radius: 24px;
            padding: 0.9rem 1.4rem;
            font-size: 1rem;
            font-family: 'Quicksand', 'Noto Serif SC', sans-serif;
            outline: none;
            transition: 0.25s ease;
            background: #fffcf5;
            color: #3b332b;
            resize: vertical;
        }

        input:focus, textarea:focus {
            border-color: #c99c7b;
            box-shadow: 0 0 0 4px rgba(217, 155, 122, 0.2);
            background: #ffffff;
        }

        textarea {
            min-height: 110px;
        }

        .submit-btn {
            background: #c8a27b;
            border: none;
            padding: 0.9rem 2.2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.15rem;
            color: #fffef5;
            background: linear-gradient(135deg, #b58b5a, #9c7a5c);
            box-shadow: 0 10px 20px rgba(140, 100, 60, 0.3);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            transition: 0.3s;
            border: 1px solid #dbb07b;
            letter-spacing: 1px;
            width: 100%;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, #c79a6e, #b0835a);
            box-shadow: 0 14px 28px rgba(160, 110, 60, 0.4);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(2px);
            box-shadow: 0 5px 12px rgba(120, 80, 40, 0.4);
        }

        .password-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.8rem;
        }

        .password-wrapper {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .password-input {
            flex: 2;
            min-width: 200px;
        }

        .unlock-btn {
            background: #f5e7da;
            border: 1px solid #c8aa88;
            color: #4e3b2c;
            font-weight: 600;
            padding: 0.9rem 1.8rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #ede0d0;
        }

        .unlock-btn:hover {
            background: #dbbc8c;
            color: #2f2419;
            border-color: #aa8b6e;
        }

        .message-list {
            margin-top: 1.8rem;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 0.3rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-item {
            background: #fffbf3;
            border-radius: 28px;
            padding: 1.1rem 1.5rem;
            border-left: 6px solid #d9b382;
            box-shadow: 0 6px 18px rgba(150, 110, 70, 0.08);
            transition: 0.2s;
            word-break: break-word;
        }

        .message-item strong {
            color: #7b5e47;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 0.3rem;
        }

        .message-item .time {
            font-size: 0.8rem;
            color: #b2977e;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .no-data {
            text-align: center;
            color: #b9a18b;
            font-style: italic;
            padding: 2rem;
        }

        .error-message {
            color: #b15e4a;
            font-size: 0.9rem;
            margin-top: 0.4rem;
        }

        .footer-note {
            text-align: center;
            margin-top: 1.5rem;
            color: #b2967c;
            font-size: 0.85rem;
        }

        @media (max-width: 550px) {
            .main-container {
                padding: 1.8rem 1.2rem;
            }
            .header h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-feather-alt"></i>
            </div>
            <h1>时光留言箱</h1>
            <div class="subhead">致我们滚烫的青春 · 毕业生心里话</div>
        </div>

        <div class="toggle-bar">
            <button id="showWriteBtn" class="toggle-btn active">
                <i class="fas fa-pen-fancy"></i> 写留言
            </button>
            <button id="showViewBtn" class="toggle-btn">
                <i class="fas fa-lock"></i> 查看收藏
            </button>
        </div>

        <div id="writeCard" class="card">
            <form id="messageForm">
                <div class="form-group">
                    <label><i class="fas fa-user-graduate"></i> 你的名字</label>
                    <input type="text" id="senderName" placeholder="例如：小明 / 匿名小可爱" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-comment-dots"></i> 心里话</label>
                    <textarea id="messageContent" placeholder="写点什么吧... 关于青春、离别、感谢或梦想..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> 投递到时光箱
                </button>
            </form>
            <div class="footer-note">
                <i class="far fa-smile"></i> 每一句话都会被温柔收藏
            </div>
        </div>

        <div id="viewCard" class="card hidden">
            <div class="password-section">
                <label style="justify-content:center; margin-bottom:0.6rem;"><i class="fas fa-key"></i> 管理员验证</label>
                <div class="password-wrapper">
                    <input type="password" id="adminPassword" class="password-input" placeholder="输入密码" value="">
                    <button id="unlockButton" class="unlock-btn"><i class="fas fa-unlock-alt"></i> 解锁</button>
                </div>
                <div id="passwordError" class="error-message"></div>
            </div>

            <div id="dataDisplayArea">
                <div class="message-list" id="messageContainer">
                    <div class="no-data"><i class="far fa-envelope-open"></i> 解锁后查看留言...</div>
                </div>
            </div>
            <div style="display: flex; justify-content: center; margin-top: 1rem;">
                <button id="refreshAfterUnlock" class="unlock-btn" style="display: none; background:#e7cfb0;"><i class="fas fa-sync-alt"></i> 刷新列表</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const STORAGE_KEY = 'graduate_message_box_v1';

            function getMessages() {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    try {
                        return JSON.parse(stored);
                    } catch (e) {
                        return [];
                    }
                }
                return [];
            }

            function saveMessages(messages) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
            }

            function addMessage(name, content) {
                const messages = getMessages();
                const newMessage = {
                    id: Date.now(),
                    name: name.trim() || "匿名同学",
                    content: content.trim(),
                    timestamp: new Date().toLocaleString('zh-CN', { 
                        year: 'numeric', month: '2-digit', day: '2-digit',
                        hour: '2-digit', minute: '2-digit', second: '2-digit'
                    })
                };
                messages.push(newMessage);
                saveMessages(messages);
                return newMessage;
            }

            const writeCard = document.getElementById('writeCard');
            const viewCard = document.getElementById('viewCard');
            const showWriteBtn = document.getElementById('showWriteBtn');
            const showViewBtn = document.getElementById('showViewBtn');
            
            const messageForm = document.getElementById('messageForm');
            const senderNameInput = document.getElementById('senderName');
            const messageContentInput = document.getElementById('messageContent');
            
            const adminPasswordInput = document.getElementById('adminPassword');
            const unlockButton = document.getElementById('unlockButton');
            const passwordError = document.getElementById('passwordError');
            const messageContainer = document.getElementById('messageContainer');
            const refreshBtn = document.getElementById('refreshAfterUnlock');

            const CORRECT_PASSWORD = '123456';
            
            let isAuthenticated = false;

            function setActiveCard(cardType) {
                if (cardType === 'write') {
                    writeCard.classList.remove('hidden');
                    viewCard.classList.add('hidden');
                    showWriteBtn.classList.add('active');
                    showViewBtn.classList.remove('active');
                    passwordError.textContent = '';
                    adminPasswordInput.value = '';
                } else {
                    viewCard.classList.remove('hidden');
                    writeCard.classList.add('hidden');
                    showViewBtn.classList.add('active');
                    showWriteBtn.classList.remove('active');
                    if (isAuthenticated) {
                        renderMessages();
                        refreshBtn.style.display = 'inline-flex';
                    } else {
                        messageContainer.innerHTML = '<div class="no-data"><i class="fas fa-lock"></i> 请输入密码解锁查看</div>';
                        refreshBtn.style.display = 'none';
                    }
                    passwordError.textContent = '';
                }
            }

            showWriteBtn.addEventListener('click', () => setActiveCard('write'));
            showViewBtn.addEventListener('click', () => setActiveCard('view'));

            messageForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const name = senderNameInput.value.trim();
                const content = messageContentInput.value.trim();
                
                if (!name || !content) {
                    alert('请填写名字和心里话哟 ✨');
                    return;
                }
                
                addMessage(name, content);
                
                senderNameInput.value = '';
                messageContentInput.value = '';
                
                showTemporaryMessage('留言已投递到时光箱！🎓', 'submit-btn');
                
                if (isAuthenticated && !viewCard.classList.contains('hidden')) {
                    renderMessages();
                }
            });

            function showTemporaryMessage(text, selectorClass) {
                const btn = document.querySelector('.' + selectorClass);
                if (!btn) return;
                const originalText = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-check-circle"></i> ${text}`;
                btn.style.background = 'linear-gradient(135deg, #a78b71, #8b6f50)';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = 'linear-gradient(135deg, #b58b5a, #9c7a5c)';
                }, 2000);
            }

            unlockButton.addEventListener('click', function() {
                const enteredPassword = adminPasswordInput.value;
                if (enteredPassword === CORRECT_PASSWORD) {
                    isAuthenticated = true;
                    passwordError.textContent = '';
                    adminPasswordInput.value = '';
                    renderMessages();
                    refreshBtn.style.display = 'inline-flex';
                } else {
                    isAuthenticated = false;
                    passwordError.textContent = '密码错误，请重试 🔒';
                    messageContainer.innerHTML = '<div class="no-data"><i class="fas fa-shield-alt"></i> 需要密码验证</div>';
                    refreshBtn.style.display = 'none';
                    adminPasswordInput.value = '';
                }
            });

            adminPasswordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    unlockButton.click();
                }
            });

            refreshBtn.addEventListener('click', function() {
                if (isAuthenticated) {
                    renderMessages();
                } else {
                    messageContainer.innerHTML = '<div class="no-data">请先解锁</div>';
                }
            });

            function renderMessages() {
                if (!isAuthenticated) {
                    messageContainer.innerHTML = '<div class="no-data"><i class="fas fa-lock"></i> 未验证</div>';
                    return;
                }
                
                const messages = getMessages();
                if (messages.length === 0) {
                    messageContainer.innerHTML = '<div class="no-data"><i class="far fa-envelope"></i> 还没有留言，快去做第一个吧 🌟</div>';
                    return;
                }

                const sortedMessages = [...messages].reverse();
                
                let html = '';
                sortedMessages.forEach(msg => {
                    html += `
                        <div class="message-item">
                            <strong><i class="fas fa-user-circle"></i> ${escapeHtml(msg.name)}</strong>
                            <p style="margin:0.4rem 0; color:#4e3f32; line-height:1.5;">${escapeHtml(msg.content)}</p>
                            <div class="time"><i class="far fa-clock"></i> ${escapeHtml(msg.timestamp)}</div>
                        </div>
                    `;
                });
                messageContainer.innerHTML = html;
            }

            function escapeHtml(text) {
                if (!text) return '';
                return String(text)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
            }

            setActiveCard('write');
        })();
    </script>
</body>
</html>
