<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 毕业生留言箱 - 青春不散场</title>
    <style>
        :root {
            --bg: #fdf8f3;
            --card-bg: #ffffff;
            --primary: #2c3e50;
            --gold: #c9a96e;
            --gold-light: #e0d3b8;
            --accent: #8b5e3c;
            --text: #3d3226;
            --text-light: #6b5e4f;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.10);
            --radius: 18px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --font-cn: 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            --font-en: 'Georgia', 'Times New Roman', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-cn);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(201, 169, 110, 0.08) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 85%, rgba(139, 94, 60, 0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(201, 169, 110, 0.03) 0%, transparent 70%);
            background-attachment: fixed;
        }

        /* ============ 粒子背景 ============ */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            opacity: 0;
            animation: floatUp var(--dur) ease-in infinite;
            animation-delay: var(--delay);
            font-size: var(--size);
            left: var(--x);
            bottom: -40px;
            filter: blur(0.5px);
        }
        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(0) rotate(0deg) scale(0.6);
            }
            10% {
                opacity: 0.7;
            }
            40% {
                opacity: 0.5;
            }
            85% {
                opacity: 0.1;
            }
            100% {
                opacity: 0;
                transform: translateY(-105vh) rotate(var(--rot)) scale(1.3);
            }
        }

        /* ============ 头部导航 ============ */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 169, 110, 0.18);
            padding: 14px 0;
            transition: var(--transition);
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary);
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
        }
        .logo .cap-icon {
            font-size: 1.8rem;
            animation: bounceCap 2s ease-in-out infinite;
        }
        @keyframes bounceCap {
            0%,
            100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-8px);
            }
            50% {
                transform: translateY(0);
            }
            70% {
                transform: translateY(-4px);
            }
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: var(--transition);
            font-family: var(--font-cn);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--gold);
            color: #fff;
            box-shadow: 0 4px 14px rgba(201, 169, 110, 0.35);
        }
        .btn-primary:hover {
            background: #b8944f;
            box-shadow: 0 6px 22px rgba(201, 169, 110, 0.5);
            transform: translateY(-2px);
        }
        .btn-outline {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--gold-light);
        }
        .btn-outline:hover {
            background: rgba(201, 169, 110, 0.08);
            border-color: var(--gold);
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 0.85rem;
            border-radius: 20px;
        }
        .btn-danger {
            background: #e05555;
            color: #fff;
            border: none;
        }
        .btn-danger:hover {
            background: #c94444;
            box-shadow: 0 4px 14px rgba(224, 85, 85, 0.35);
            transform: translateY(-1px);
        }
        .btn-ghost {
            background: transparent;
            color: var(--text-light);
            border: 1px solid transparent;
            padding: 8px 14px;
        }
        .btn-ghost:hover {
            background: rgba(0, 0, 0, 0.03);
            border-color: #ddd;
        }

        /* ============ 主内容区 ============ */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 60px;
            position: relative;
            z-index: 1;
        }
        .hero {
            text-align: center;
            padding: 40px 20px 30px;
            position: relative;
        }
        .hero h1 {
            font-family: var(--font-en);
            font-size: 2.8rem;
            font-weight: 400;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .hero h1 .cn {
            font-family: var(--font-cn);
            font-weight: 700;
            font-size: 2.4rem;
            letter-spacing: 2px;
        }
        .hero .subtitle {
            color: var(--text-light);
            font-size: 1.05rem;
            letter-spacing: 1.5px;
            margin-top: 4px;
        }
        .hero .divider {
            display: inline-block;
            width: 60px;
            height: 2px;
            background: var(--gold);
            margin: 16px 0 8px;
            border-radius: 1px;
        }
        .stats-row {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .stat-item {
            text-align: center;
            background: var(--card-bg);
            border-radius: var(--radius-sm);
            padding: 16px 24px;
            box-shadow: var(--shadow);
            min-width: 90px;
            transition: var(--transition);
        }
        .stat-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gold);
            font-family: var(--font-en);
        }
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        /* ============ 留言卡片网格 ============ */
        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .message-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 24px 22px 20px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            border-left: 4px solid transparent;
            animation: cardIn 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        .message-card:nth-child(1) {
            border-left-color: #c9a96e;
        }
        .message-card:nth-child(2) {
            border-left-color: #8b9dc3;
        }
        .message-card:nth-child(3) {
            border-left-color: #a8c9a6;
        }
        .message-card:nth-child(4) {
            border-left-color: #d4a0a0;
        }
        .message-card:nth-child(5) {
            border-left-color: #b8a9c9;
        }
        .message-card:nth-child(5n+1) {
            border-left-color: #c9a96e;
        }
        .message-card:nth-child(5n+2) {
            border-left-color: #8b9dc3;
        }
        .message-card:nth-child(5n+3) {
            border-left-color: #a8c9a6;
        }
        .message-card:nth-child(5n+4) {
            border-left-color: #d4a0a0;
        }
        .message-card:nth-child(5n+5) {
            border-left-color: #b8a9c9;
        }
        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff;
            flex-shrink: 0;
            letter-spacing: 0;
            font-family: var(--font-cn);
        }
        .card-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--primary);
            letter-spacing: 0.3px;
        }
        .card-class {
            font-size: 0.8rem;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }
        .card-date {
            font-size: 0.75rem;
            color: #aaa;
            letter-spacing: 0.5px;
        }
        .card-message {
            color: var(--text);
            line-height: 1.7;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            word-break: break-word;
            position: relative;
            padding-left: 16px;
            border-left: 2px solid var(--gold-light);
            margin: 8px 0 4px;
        }
        .card-message::before {
            content: '"';
            position: absolute;
            left: 3px;
            top: -6px;
            font-size: 2rem;
            color: var(--gold-light);
            font-family: var(--font-en);
            line-height: 1;
        }
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }
        .tag {
            font-size: 0.72rem;
            padding: 4px 10px;
            border-radius: 12px;
            background: rgba(201, 169, 110, 0.1);
            color: var(--accent);
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* ============ 模态窗口 ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease-out;
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
            padding: 20px;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fff;
            border-radius: var(--radius);
            padding: 32px 28px 24px;
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.35s cubic-bezier(0.22, 0.61, 0.36, 1);
            position: relative;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: #999;
            transition: var(--transition);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #f5f5f5;
            color: #333;
        }
        .modal h2 {
            text-align: center;
            font-size: 1.5rem;
            color: var(--primary);
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .modal .modal-subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--primary);
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 15px;
            border: 2px solid #e8e3da;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: var(--font-cn);
            transition: var(--transition);
            background: #fdfcf9;
            color: var(--text);
            letter-spacing: 0.3px;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.08);
            background: #fff;
        }
        .form-group textarea {
            min-height: 100px;
        }
        .form-group .char-count {
            text-align: right;
            font-size: 0.75rem;
            color: #bbb;
            margin-top: 2px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 13px;
            font-size: 1rem;
            border-radius: 28px;
            letter-spacing: 1px;
        }

        /* ============ 管理员面板 ============ */
        .admin-panel {
            display: none;
        }
        .admin-panel.active {
            display: block;
        }
        .admin-header {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding: 20px 24px;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .admin-header h2 {
            font-size: 1.4rem;
            color: var(--primary);
            letter-spacing: 0.5px;
        }
        .admin-stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .admin-stat {
            text-align: center;
            padding: 10px 18px;
            background: #fdf8f3;
            border-radius: var(--radius-sm);
            min-width: 70px;
        }
        .admin-stat .num {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--gold);
            font-family: var(--font-en);
        }
        .admin-stat .lbl {
            font-size: 0.7rem;
            color: var(--text-light);
            letter-spacing: 1px;
        }
        .search-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .search-bar input {
            padding: 9px 14px;
            border: 2px solid #e8e3da;
            border-radius: 22px;
            font-size: 0.9rem;
            font-family: var(--font-cn);
            min-width: 200px;
            transition: var(--transition);
            background: #fdfcf9;
        }
        .search-bar input:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(201, 169, 110, 0.06);
        }
        .message-table-wrap {
            overflow-x: auto;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .message-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }
        .message-table th,
        .message-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #f2ede5;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        .message-table th {
            background: #fdf8f3;
            font-weight: 700;
            color: var(--primary);
            font-size: 0.8rem;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            position: sticky;
            top: 0;
        }
        .message-table tr {
            transition: var(--transition);
        }
        .message-table tbody tr:hover {
            background: #fefcf9;
        }
        .message-table .msg-preview {
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            color: var(--accent);
            font-weight: 500;
        }
        .message-table .msg-preview:hover {
            text-decoration: underline;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .badge-new {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .badge-today {
            background: #fff3e0;
            color: #e65100;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #ccc;
        }
        .empty-state .icon {
            font-size: 5rem;
            display: block;
            margin-bottom: 16px;
        }
        .empty-state p {
            font-size: 1.1rem;
            color: #bbb;
            letter-spacing: 1px;
        }

        /* ============ Toast ============ */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            padding: 14px 22px;
            border-radius: 25px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            animation: toastIn 0.4s ease-out, toastOut 0.35s ease-in forwards;
            animation-delay: 0s, 2.2s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
            max-width: 380px;
        }
        .toast-success {
            background: #4caf50;
        }
        .toast-error {
            background: #e05555;
        }
        .toast-info {
            background: #3b7dd8;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(60px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(60px);
            }
        }

        /* ============ 响应式 ============ */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .hero h1 .cn {
                font-size: 1.7rem;
            }
            .messages-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 14px;
            }
            .header-inner {
                padding: 0 14px;
            }
            .logo {
                font-size: 1.1rem;
            }
            .btn {
                padding: 8px 15px;
                font-size: 0.85rem;
            }
            .modal {
                padding: 24px 18px 18px;
                max-width: 95vw;
            }
            .admin-header {
                flex-direction: column;
                align-items: stretch;
                padding: 16px;
            }
            .search-bar input {
                min-width: 100%;
            }
        }
        @media (max-width: 400px) {
            .hero h1 {
                font-size: 1.5rem;
            }
            .hero h1 .cn {
                font-size: 1.3rem;
            }
            .messages-grid {
                grid-template-columns: 1fr;
            }
            .stats-row {
                gap: 10px;
            }
            .stat-item {
                padding: 10px 14px;
                min-width: 60px;
            }
            .stat-number {
                font-size: 1.4rem;
            }
        }

        /* ============ 滚动条美化 ============ */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d5c8b0;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b8a88a;
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        /* 详情弹窗 */
        .detail-modal-content {
            line-height: 1.8;
        }
        .detail-modal-content .detail-row {
            margin-bottom: 10px;
        }
        .detail-modal-content .detail-label {
            font-weight: 700;
            color: var(--primary);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .detail-modal-content .detail-value {
            color: var(--text);
            font-size: 0.95rem;
            margin-top: 2px;
        }
        .detail-msg-full {
            background: #fdf8f3;
            padding: 16px;
            border-radius: var(--radius-sm);
            margin-top: 8px;
            line-height: 1.8;
            font-style: italic;
            letter-spacing: 0.3px;
            border-left: 3px solid var(--gold);
        }
    </style>
</head>
<body>

    <!-- ==================== 粒子背景 ==================== -->
    <div class="particles-container" id="particlesContainer"></div>

    <!-- ==================== Toast容器 ==================== -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ==================== 头部导航 ==================== -->
    <header class="header">
        <div class="header-inner">
            <a href="#" class="logo" onclick="showHome()" title="返回首页">
                <span class="cap-icon">🎓</span> 毕业生留言箱
            </a>
            <div class="header-actions">
                <button class="btn btn-outline btn-sm" onclick="showHome()" id="btnHome">🏠 留言墙</button>
                <button class="btn btn-primary btn-sm" onclick="openWriteModal()" id="btnWrite">✍️ 写留言</button>
                <button class="btn btn-ghost btn-sm" onclick="openAdminLogin()" id="btnAdmin">🔐 管理员</button>
                <button class="btn btn-outline btn-sm hidden" onclick="logoutAdmin()" id="btnLogout">🚪 退出管理</button>
            </div>
        </div>
    </header>

    <!-- ==================== 主内容区 ==================== -->
    <div class="main-container" id="mainContainer">
        <!-- 首页：留言墙 -->
        <div id="homeView">
            <div class="hero">
                <h1>
                    <span class="cn">青春不散场</span>
                    <br><small style="font-size:1.1rem;color:var(--text-light);">Graduation Memory Wall</small>
                </h1>
                <div class="divider"></div>
                <p class="subtitle">每一段留言，都是青春的印记 ✨</p>
                <div class="stats-row" id="statsRow">
                    <div class="stat-item">
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">总留言数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statToday">0</div>
                        <div class="stat-label">今日留言</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="statClasses">0</div>
                        <div class="stat-label">涉及班级</div>
                    </div>
                </div>
            </div>
            <div class="messages-grid" id="messagesGrid">
                <div class="empty-state">
                    <span class="icon">📭</span>
                    <p>还没有留言，快来写下第一条吧！</p>
                </div>
            </div>
        </div>

        <!-- 管理员面板 -->
        <div class="admin-panel" id="adminView">
            <div class="admin-header">
                <div>
                    <h2>☁️ 云端管理后台</h2>
                    <p style="color:var(--text-light);font-size:0.85rem;letter-spacing:0.5px;">查看所有留言详情 · 数据实时同步</p>
                </div>
                <div class="admin-stats">
                    <div class="admin-stat"><div class="num" id="adminTotal">0</div><div class="lbl">总留言</div></div>
                    <div class="admin-stat"><div class="num" id="adminToday">0</div><div class="lbl">今日新增</div></div>
                    <div class="admin-stat"><div class="num" id="adminThisWeek">0</div><div class="lbl">本周</div></div>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="🔍 搜索姓名、班级、内容..." oninput="renderAdminTable()">
                    <button class="btn btn-outline btn-sm" onclick="exportData()">📥 导出数据</button>
                    <button class="btn btn-outline btn-sm" onclick="clearAllData()" style="color:#e05555;border-color:#e05555;">🗑️ 清空全部</button>
                </div>
            </div>
            <div class="message-table-wrap">
                <table class="message-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>姓名</th>
                            <th>班级</th>
                            <th>留言预览</th>
                            <th>标签</th>
                            <th>时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="adminTableBody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:40px;color:#ccc;">暂无留言数据</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ==================== 写留言模态窗口 ==================== -->
    <div class="modal-overlay hidden" id="writeModalOverlay">
        <div class="modal" id="writeModal">
            <button class="modal-close" onclick="closeWriteModal()">✕</button>
            <h2>✍️ 写下你的毕业寄语</h2>
            <p class="modal-subtitle">让这份回忆永远留存</p>
            <form id="messageForm" onsubmit="submitMessage(event)">
                <div class="form-row">
                    <div class="form-group">
                        <label>👤 你的名字 *</label>
                        <input type="text" id="inputName" placeholder="例如：张三" required maxlength="30">
                    </div>
                    <div class="form-group">
                        <label>🏫 班级/专业</label>
                        <input type="text" id="inputClass" placeholder="例如：计算机科学2024届" maxlength="50">
                    </div>
                </div>
                <div class="form-group">
                    <label>💬 留言内容 *</label>
                    <textarea id="inputMessage" placeholder="写下你想对母校、老师、同学说的话..." required maxlength="500" oninput="updateCharCount()"></textarea>
                    <div class="char-count"><span id="charCount">0</span>/500</div>
                </div>
                <div class="form-group">
                    <label>🏷️ 标签（可选，用逗号分隔）</label>
                    <input type="text" id="inputTags" placeholder="例如：感恩, 青春, 友谊" maxlength="80">
                </div>
                <div class="form-group">
                    <label>📧 邮箱（可选，仅用于留档）</label>
                    <input type="email" id="inputEmail" placeholder="your@email.com" maxlength="80">
                </div>
                <button type="submit" class="btn btn-primary btn-full">🌟 提交留言</button>
            </form>
        </div>
    </div>

    <!-- ==================== 管理员登录模态窗口 ==================== -->
    <div class="modal-overlay hidden" id="adminLoginOverlay">
        <div class="modal" style="max-width:400px;">
            <button class="modal-close" onclick="closeAdminLogin()">✕</button>
            <h2>🔐 管理员登录</h2>
            <p class="modal-subtitle">请输入密码访问云端管理后台</p>
            <form onsubmit="adminLogin(event)">
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="adminPassword" placeholder="请输入管理员密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">🔓 登录</button>
            </form>
            <p style="text-align:center;margin-top:12px;font-size:0.75rem;color:#ccc;">默认密码：graduate2024</p>
        </div>
    </div>

    <!-- ==================== 留言详情模态窗口 ==================== -->
    <div class="modal-overlay hidden" id="detailModalOverlay">
        <div class="modal" style="max-width:500px;">
            <button class="modal-close" onclick="closeDetailModal()">✕</button>
            <h2>📋 留言详情</h2>
            <div class="detail-modal-content" id="detailContent"></div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 数据管理 ====================
            const STORAGE_KEY = 'graduate_messages_db';
            const ADMIN_KEY = 'graduate_admin_auth';
            const DEFAULT_PASSWORD = 'graduate2024';

            function getMessages() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    return raw ? JSON.parse(raw) : [];
                } catch (e) {
                    return [];
                }
            }

            function saveMessages(messages) {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
                } catch (e) {
                    showToast('存储空间不足，请清理旧数据', 'error');
                }
            }

            function generateId() {
                return 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            }

            function getAvatarColor(name) {
                const colors = [
                    '#c9a96e', '#6b8fad', '#7dac7d', '#c97d7d', '#9b7db8',
                    '#d4956b', '#5b9aa0', '#b8806b', '#6a9fb5', '#c4a35a',
                    '#8e7cc3', '#c27ba0', '#56a89b', '#d4a574', '#7b9ec7'
                ];
                let hash = 0;
                for (let i = 0; i < (name || '?').length; i++) {
                    hash = name.charCodeAt(i) + ((hash << 5) - hash);
                }
                return colors[Math.abs(hash) % colors.length];
            }

            function getInitials(name) {
                if (!name || name.trim().length === 0) return '?';
                const trimmed = name.trim();
                // 取最后一个字或第一个字
                return trimmed.length <= 2 ? trimmed : trimmed.slice(-2);
            }

            function formatDate(timestamp) {
                const d = new Date(timestamp);
                const now = new Date();
                const diffMs = now - d;
                const diffMin = Math.floor(diffMs / 60000);
                const diffHour = Math.floor(diffMs / 3600000);
                const diffDay = Math.floor(diffMs / 86400000);

                if (diffMin < 1) return '刚刚';
                if (diffMin < 60) return diffMin + '分钟前';
                if (diffHour < 24) return diffHour + '小时前';
                if (diffDay < 7) return diffDay + '天前';

                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                const hour = String(d.getHours()).padStart(2, '0');
                const min = String(d.getMinutes()).padStart(2, '0');
                if (year === now.getFullYear()) {
                    return `${month}-${day} ${hour}:${min}`;
                }
                return `${year}-${month}-${day}`;
            }

            function isToday(timestamp) {
                const d = new Date(timestamp);
                const now = new Date();
                return d.getFullYear() === now.getFullYear() &&
                    d.getMonth() === now.getMonth() &&
                    d.getDate() === now.getDate();
            }

            function isThisWeek(timestamp) {
                const d = new Date(timestamp);
                const now = new Date();
                const diffDays = Math.floor((now - d) / 86400000);
                return diffDays < 7;
            }

            // ==================== Toast ====================
            function showToast(msg, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.textContent = msg;
                container.appendChild(toast);
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 2700);
            }

            // ==================== 粒子背景 ====================
            function initParticles() {
                const container = document.getElementById('particlesContainer');
                const emojis = ['🌸', '🍃', '✨', '💫', '🎓', '⭐', '🌿', '🕊️', '💐', '🌟', '🍂', '🌺'];
                const fragment = document.createDocumentFragment();
                for (let i = 0; i < 35; i++) {
                    const span = document.createElement('span');
                    span.className = 'particle';
                    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    span.style.setProperty('--x', Math.random() * 94 + '%');
                    span.style.setProperty('--dur', (8 + Math.random() * 16) + 's');
                    span.style.setProperty('--delay', Math.random() * 12 + 's');
                    span.style.setProperty('--size', (0.9 + Math.random() * 1.8) + 'rem');
                    span.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
                    fragment.appendChild(span);
                }
                container.appendChild(fragment);
            }

            // ==================== 渲染留言墙 ====================
            function renderMessageWall() {
                const messages = getMessages();
                const grid = document.getElementById('messagesGrid');
                const statsRow = document.getElementById('statsRow');

                // 更新统计
                const total = messages.length;
                const todayCount = messages.filter(m => isToday(m.timestamp)).length;
                const classesSet = new Set(messages.map(m => m.className).filter(Boolean));
                document.getElementById('statTotal').textContent = total;
                document.getElementById('statToday').textContent = todayCount;
                document.getElementById('statClasses').textContent = classesSet.size;

                if (total === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column:1/-1;">
                            <span class="icon">📭</span>
                            <p>还没有留言，快来写下第一条吧！</p>
                        </div>`;
                    return;
                }

                // 按时间倒序
                const sorted = [...messages].sort((a, b) => b.timestamp - a.timestamp);
                grid.innerHTML = sorted.map((msg, index) => {
                    const avatarColor = getAvatarColor(msg.name);
                    const initials = getInitials(msg.name);
                    const tags = msg.tags || [];
                    const tagsHtml = tags.length > 0 ?
                        tags.map(t => `<span class="tag">#${escapeHtml(t.trim())}</span>`).join('') :
                        '';
                    return `
                        <div class="message-card" style="animation-delay:${index * 0.06}s;">
                            <div class="card-header">
                                <div class="avatar" style="background:${avatarColor};">${initials}</div>
                                <div>
                                    <div class="card-name">${escapeHtml(msg.name)}</div>
                                    <div class="card-class">${escapeHtml(msg.className || '未填写班级')}</div>
                                </div>
                                <div style="margin-left:auto;">
                                    <div class="card-date">${formatDate(msg.timestamp)}</div>
                                </div>
                            </div>
                            <div class="card-message">${escapeHtml(msg.message)}</div>
                            ${tagsHtml ? `<div class="card-tags">${tagsHtml}</div>` : ''}
                        </div>`;
                }).join('');
            }

            function escapeHtml(str) {
                if (!str) return '';
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 提交留言 ====================
            function submitMessage(e) {
                e.preventDefault();
                const name = document.getElementById('inputName').value.trim();
                const className = document.getElementById('inputClass').value.trim();
                const message = document.getElementById('inputMessage').value.trim();
                const tagsRaw = document.getElementById('inputTags').value.trim();
                const email = document.getElementById('inputEmail').value.trim();

                if (!name || !message) {
                    showToast('请填写姓名和留言内容', 'error');
                    return;
                }
                if (message.length < 2) {
                    showToast('留言内容太短了，多写一些吧~', 'error');
                    return;
                }

                const tags = tagsRaw ? tagsRaw.split(/[,，\s]+/).filter(t => t.length > 0).slice(0, 5) : [];
                const newMsg = {
                    id: generateId(),
                    name: name,
                    className: className,
                    message: message,
                    tags: tags,
                    email: email,
                    timestamp: Date.now(),
                };

                const messages = getMessages();
                messages.push(newMsg);
                saveMessages(messages);

                // 清空表单
                document.getElementById('inputName').value = '';
                document.getElementById('inputClass').value = '';
                document.getElementById('inputMessage').value = '';
                document.getElementById('inputTags').value = '';
                document.getElementById('inputEmail').value = '';
                document.getElementById('charCount').textContent = '0';

                closeWriteModal();
                renderMessageWall();
                renderAdminTable();
                showToast('🎉 留言提交成功！感谢你的分享~', 'success');
            }

            function updateCharCount() {
                const textarea = document.getElementById('inputMessage');
                const count = textarea.value.length;
                document.getElementById('charCount').textContent = count;
                if (count > 450) {
                    document.getElementById('charCount').style.color = '#e05555';
                } else if (count > 350) {
                    document.getElementById('charCount').style.color = '#e6a817';
                } else {
                    document.getElementById('charCount').style.color = '#bbb';
                }
            }

            // ==================== 模态窗口控制 ====================
            function openWriteModal() {
                document.getElementById('writeModalOverlay').classList.remove('hidden');
                document.getElementById('inputName').focus();
                document.body.style.overflow = 'hidden';
            }

            function closeWriteModal() {
                document.getElementById('writeModalOverlay').classList.add('hidden');
                document.body.style.overflow = '';
            }

            function openAdminLogin() {
                document.getElementById('adminLoginOverlay').classList.remove('hidden');
                document.getElementById('adminPassword').focus();
                document.body.style.overflow = 'hidden';
            }

            function closeAdminLogin() {
                document.getElementById('adminLoginOverlay').classList.add('hidden');
                document.getElementById('adminPassword').value = '';
                document.body.style.overflow = '';
            }

            function openDetailModal(msgId) {
                const messages = getMessages();
                const msg = messages.find(m => m.id === msgId);
                if (!msg) return;
                const content = document.getElementById('detailContent');
                content.innerHTML = `
                    <div class="detail-row">
                        <div class="detail-label">👤 姓名</div>
                        <div class="detail-value">${escapeHtml(msg.name)}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">🏫 班级</div>
                        <div class="detail-value">${escapeHtml(msg.className || '未填写')}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">📧 邮箱</div>
                        <div class="detail-value">${escapeHtml(msg.email || '未填写')}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">🕐 提交时间</div>
                        <div class="detail-value">${new Date(msg.timestamp).toLocaleString('zh-CN')}</div>
                    </div>
                    <div class="detail-row">
                        <div class="detail-label">💬 留言内容</div>
                        <div class="detail-msg-full">${escapeHtml(msg.message)}</div>
                    </div>
                    ${msg.tags && msg.tags.length > 0 ? `
                    <div class="detail-row">
                        <div class="detail-label">🏷️ 标签</div>
                        <div class="detail-value">${msg.tags.map(t => '#' + escapeHtml(t)).join(' ')}</div>
                    </div>` : ''}
                    <div class="detail-row">
                        <div class="detail-label">🆔 留言ID</div>
                        <div class="detail-value" style="font-size:0.75rem;color:#ccc;">${msg.id}</div>
                    </div>
                `;
                document.getElementById('detailModalOverlay').classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            }

            function closeDetailModal() {
                document.getElementById('detailModalOverlay').classList.add('hidden');
                document.body.style.overflow = '';
            }

            // 点击遮罩关闭
            document.getElementById('writeModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeWriteModal();
            });
            document.getElementById('adminLoginOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeAdminLogin();
            });
            document.getElementById('detailModalOverlay').addEventListener('click', function(e) {
                if (e.target === this) closeDetailModal();
            });

            // ESC关闭
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeWriteModal();
                    closeAdminLogin();
                    closeDetailModal();
                }
            });

            // ==================== 管理员功能 ====================
            function adminLogin(e) {
                e.preventDefault();
                const password = document.getElementById('adminPassword').value;
                if (password === DEFAULT_PASSWORD) {
                    localStorage.setItem(ADMIN_KEY, 'true');
                    closeAdminLogin();
                    showAdminPanel();
                    showToast('✅ 登录成功，欢迎管理员！', 'success');
                } else {
                    showToast('❌ 密码错误，请重试', 'error');
                    document.getElementById('adminPassword').value = '';
                }
            }

            function logoutAdmin() {
                localStorage.removeItem(ADMIN_KEY);
                showHome();
                showToast('已退出管理后台', 'info');
            }

            function showAdminPanel() {
                document.getElementById('homeView').classList.add('hidden');
                document.getElementById('adminView').classList.add('active');
                document.getElementById('btnHome').classList.remove('hidden');
                document.getElementById('btnWrite').classList.add('hidden');
                document.getElementById('btnAdmin').classList.add('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
                updateAdminStats();
                renderAdminTable();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function showHome() {
                document.getElementById('homeView').classList.remove('hidden');
                document.getElementById('adminView').classList.remove('active');
                document.getElementById('btnHome').classList.remove('hidden');
                document.getElementById('btnWrite').classList.remove('hidden');
                document.getElementById('btnAdmin').classList.remove('hidden');
                document.getElementById('btnLogout').classList.add('hidden');
                document.getElementById('searchInput').value = '';
                renderMessageWall();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            function updateAdminStats() {
                const messages = getMessages();
                const total = messages.length;
                const todayCount = messages.filter(m => isToday(m.timestamp)).length;
                const weekCount = messages.filter(m => isThisWeek(m.timestamp)).length;
                document.getElementById('adminTotal').textContent = total;
                document.getElementById('adminToday').textContent = todayCount;
                document.getElementById('adminThisWeek').textContent = weekCount;
            }

            function renderAdminTable() {
                const messages = getMessages();
                const searchTerm = document.getElementById('searchInput')?.value?.trim().toLowerCase() || '';
                const tbody = document.getElementById('adminTableBody');

                updateAdminStats();

                let filtered = [...messages].sort((a, b) => b.timestamp - a.timestamp);
                if (searchTerm) {
                    filtered = filtered.filter(m =>
                        m.name.toLowerCase().includes(searchTerm) ||
                        (m.className || '').toLowerCase().includes(searchTerm) ||
                        m.message.toLowerCase().includes(searchTerm) ||
                        (m.tags || []).some(t => t.toLowerCase().includes(searchTerm)) ||
                        (m.email || '').toLowerCase().includes(searchTerm)
                    );
                }

                if (filtered.length === 0) {
                    tbody.innerHTML =
                        '<tr><td colspan="7" style="text-align:center;padding:40px;color:#ccc;">📭 没有匹配的留言</td></tr>';
                    return;
                }

                tbody.innerHTML = filtered.map((msg, index) => {
                    const isNew = isToday(msg.timestamp);
                    const badgeHtml = isNew ? '<span class="badge badge-new">今日</span>' : '';
                    const preview = msg.message.length > 40 ? msg.message.substring(0, 40) + '...' : msg
                        .message;
                    return `
                        <tr>
                            <td>${index + 1}</td>
                            <td><strong>${escapeHtml(msg.name)}</strong> ${badgeHtml}</td>
                            <td>${escapeHtml(msg.className || '-')}</td>
                            <td class="msg-preview" onclick="window._openDetail('${msg.id}')" title="点击查看详情">${escapeHtml(preview)}</td>
                            <td>${(msg.tags || []).map(t => '<span class="tag">#' + escapeHtml(t) + '</span>').join(' ') || '-'}</td>
                            <td style="white-space:nowrap;font-size:0.8rem;">${formatDate(msg.timestamp)}</td>
                            <td>
                                <button class="btn btn-outline btn-sm" onclick="window._openDetail('${msg.id}')" title="查看详情">📋</button>
                                <button class="btn btn-danger btn-sm" onclick="window._deleteMsg('${msg.id}')" title="删除" style="padding:6px 10px;">🗑️</button>
                            </td>
                        </tr>`;
                }).join('');
            }

            // 暴露到全局
            window._openDetail = function(id) {
                openDetailModal(id);
            };
            window._deleteMsg = function(id) {
                if (confirm('确定要删除这条留言吗？此操作不可撤销。')) {
                    let messages = getMessages();
                    messages = messages.filter(m => m.id !== id);
                    saveMessages(messages);
                    renderAdminTable();
                    renderMessageWall();
                    showToast('已删除留言', 'info');
                }
            };

            function exportData() {
                const messages = getMessages();
                if (messages.length === 0) {
                    showToast('没有数据可导出', 'error');
                    return;
                }
                const exportData = messages.map(m => ({
                    姓名: m.name,
                    班级: m.className || '',
                    留言内容: m.message,
                    标签: (m.tags || []).join(', '),
                    邮箱: m.email || '',
                    提交时间: new Date(m.timestamp).toLocaleString('zh-CN'),
                    留言ID: m.id,
                }));
                const jsonStr = JSON.stringify(exportData, null, 2);
                const blob = new Blob([jsonStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `毕业生留言数据_${new Date().toISOString().slice(0,10)}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('📥 数据导出成功！', 'success');
            }

            function clearAllData() {
                if (confirm('⚠️ 确定要清空所有留言数据吗？\n\n此操作不可撤销！建议先导出备份。\n\n点击"确定"将永久删除所有留言。')) {
                    if (confirm('再次确认：真的要清空全部数据吗？')) {
                        localStorage.removeItem(STORAGE_KEY);
                        renderMessageWall();
                        renderAdminTable();
                        updateAdminStats();
                        showToast('所有数据已清空', 'info');
                    }
                }
            }

            // ==================== 初始化 ====================
            function init() {
                initParticles();
                renderMessageWall();

                // 检查是否已登录管理员
                const isAdmin = localStorage.getItem(ADMIN_KEY) === 'true';
                if (isAdmin) {
                    showAdminPanel();
                }

                // 绑定按钮事件
                document.getElementById('btnWrite').addEventListener('click', openWriteModal);
                document.getElementById('btnAdmin').addEventListener('click', openAdminLogin);
                document.getElementById('btnLogout').addEventListener('click', logoutAdmin);
                document.getElementById('btnHome').addEventListener('click', showHome);

                // 搜索实时更新
                document.getElementById('searchInput').addEventListener('input', renderAdminTable);

                // 字符计数
                document.getElementById('inputMessage').addEventListener('input', updateCharCount);

                console.log('🎓 毕业生留言箱已就绪');
                console.log('📦 数据存储在浏览器本地存储中');
                console.log('🔐 管理员默认密码：' + DEFAULT_PASSWORD);
                console.log('💡 留言数据会保留在您的浏览器中，可通过管理员面板导出');
            }

            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
