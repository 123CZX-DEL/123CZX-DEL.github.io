<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>毕业季 · 时光留言箱</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Noto+Serif+SC:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9f3e8 0%, #fde9e0 100%);
            font-family: 'Quicksand', 'Noto Serif SC', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            top: -10%;
            left: -5%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255,215,179,0.5) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: "";
            position: absolute;
            bottom: -8%;
            right: -3%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(200,180,220,0.4) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 250, 245, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08), 0 15px 30px rgba(120, 80, 50, 0.12);
            padding: 3rem 2rem;
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 245, 235, 0.7);
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header-icon {
            font-size: 3.5rem;
            color: #d99b7a;
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0 rgba(255,255,240,0.8);
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        .header h1 {
            font-family: 'Noto Serif SC', serif;
            font-weight: 600;
            font-size: 2.8rem;
            color: #5e4632;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px rgba(255,255,250,0.9);
            margin-bottom: 0.8rem;
        }

        .subhead {
            font-size: 1.2rem;
            color: #aa8c7a;
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .intro-text {
            font-size: 1rem;
            color: #6b5a47;
            line-height: 1.8;
            margin-bottom: 2.5rem;
            padding: 1.5rem;
            background: rgba(217, 155, 122, 0.05);
            border-radius: 20px;
            border-left: 4px solid #d9b382;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.5);
            border-radius: 24px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid rgba(217, 155, 122, 0.2);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(150, 110, 70, 0.1);
            background: rgba(255, 255, 255, 0.8);
        }

        .feature-icon {
            font-size: 2.5rem;
            color: #d9b382;
            margin-bottom: 0.8rem;
        }

        .feature-title {
            font-weight: 700;
            color: #5e4632;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        .feature-desc {
            font-size: 0.9rem;
            color: #aa8c7a;
            line-height: 1.5;
        }

        .cta-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .cta-btn {
            background: linear-gradient(135deg, #b58b5a, #9c7a5c);
            border: none;
            padding: 1.2rem 2rem;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #fffef5;
            box-shadow: 0 10px 20px rgba(140, 100, 60, 0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            transition: all 0.3s ease;
            text-decoration: none;
            border: 1px solid #dbb07b;
        }

        .cta-btn:hover {
            background: linear-gradient(135deg, #c79a6e, #b0835a);
            box-shadow: 0 14px 28px rgba(160, 110, 60, 0.4);
            transform: translateY(-3px);
        }

        .cta-btn:active {
            transform: translateY(0px);
        }

        .secondary-btn {
            background: rgba(217, 179, 130, 0.2);
            color: #6b5a47;
            border: 2px solid #d9b382;
        }

        .secondary-btn:hover {
            background: rgba(217, 179, 130, 0.3);
        }

        .footer {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 2rem;
            border-top: 1px dashed #dbb594;
            color: #b2967c;
            font-size: 0.9rem;
        }

        .footer-emoji {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .subhead {
                font-size: 1rem;
            }

            .header-icon {
                font-size: 2.5rem;
            }

            .cta-buttons {
                grid-template-columns: 1fr;
            }

            .intro-text {
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="header-icon">
                <i class="fas fa-feather-alt"></i>
            </div>
            <h1>时光留言箱</h1>
            <div class="subhead">致我们滚烫的青春 · 毕业生心里话</div>
        </div>

        <div class="intro-text">
            <i class="fas fa-quote-left"></i> 
            <span style="font-style: italic;">
                毕业季，我们用留言定格青春。每一句话都是青春的见证，每一个名字都将被温柔铭记。
                打开时光留言箱，把你的心里话投递给更好的未来吧！
            </span>
            <i class="fas fa-quote-right"></i>
        </div>

        <div class="features-grid">
            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-pen-fancy"></i>
                </div>
                <div class="feature-title">自由表达</div>
                <div class="feature-desc">记录青春故事，书写心底独白</div>
            </div>

            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <div class="feature-title">隐私保护</div>
                <div class="feature-desc">密码保护留言，安全永久存储</div>
            </div>

            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-users"></i>
                </div>
                <div class="feature-title">集体回忆</div>
                <div class="feature-desc">汇聚全班的声音，共同的青春</div>
            </div>

            <div class="feature-card">
                <div class="feature-icon">
                    <i class="fas fa-heart"></i>
                </div>
                <div class="feature-title">温暖设计</div>
                <div class="feature-desc">用心设计，记录最美好的时光</div>
            </div>
        </div>

        <div class="cta-buttons">
            <a href="messagebox.html" class="cta-btn">
                <i class="fas fa-envelope"></i> 
                进入留言箱
            </a>
            <a href="clock.html" class="cta-btn secondary-btn">
                <i class="fas fa-globe"></i> 
                时区时钟
            </a>
        </div>

        <div style="background: rgba(217, 155, 122, 0.05); border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem; border-left: 4px solid #d9b382;">
            <div style="color: #5e4632; font-weight: 600; margin-bottom: 0.5rem;">
                <i class="fas fa-info-circle"></i> 提示
            </div>
            <div style="color: #6b5a47; font-size: 0.9rem; line-height: 1.6;">
                <strong>首次访问建议先填写一条留言试试看！
            </div>
        </div>

        <div class="footer">
            <div class="footer-emoji">✨ 💌 🎓</div>
            <div>时光留言箱 • 记录每一个美好时刻</div>
            <div style="margin-top: 0.5rem; opacity: 0.7;">
                © 2026 Graduation Time Capsule
            </div>
        </div>
    </div>
</body>
</html>
